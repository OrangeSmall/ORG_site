<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密任務結算系統 - 工作人員專用</title>
    <style>
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #F9F6F0;
            color: #4A433D;
            display: flex;
            justify-content: center;
            padding: 2rem;
            line-height: 1.5;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background-color: #FFFFFF;
            padding: 2.5rem;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #E5DED5;
        }
        
        /* 新增：頂部圖片容器與圖片樣式 */
        .header-image {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-image img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); /* 微微的陰影增加質感 */
        }

        h2 {
            text-align: center;
            color: #5C5248;
            border-bottom: 2px solid #E5DED5;
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .instruction {
            background-color: #FCFAFA;
            border-left: 4px solid #D4C8B8;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #6B5C4D;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 10px;
            border: 1px solid #E5DED5;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #F2EFE8;
            color: #5C5248;
            font-weight: 600;
        }
        .row-header {
            background-color: #F8F6F0;
            font-weight: bold;
        }
        .group-input {
            width: 80%;
            padding: 4px;
            text-align: center;
            border: 1px solid #D4C8B8;
            background-color: #FFF;
            border-radius: 3px;
            color: #4A433D;
            font-weight: bold;
        }
        .self-cell {
            background-color: #EBEBEB;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%, #ddd), 
                              linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%, #ddd);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
        }
        .matrix-select {
            padding: 5px;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid #D4C8B8;
            border-radius: 4px;
            background-color: #FFF;
            cursor: pointer;
            width: 60px;
            text-align: center;
        }
        .matrix-select:focus { outline: none; border-color: #A0522D; }
        
        .calc-output {
            text-align: left;
            padding-left: 10px;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.8;
        }
        .calc-output span {
            font-weight: bold;
            color: #4A433D;
            display: inline-block;
            width: 15px;
            text-align: center;
        }
        .money-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none;
            padding: 0 10px;
            height: 100%;
        }
        .money-cell .symbol {
            color: #8C7E6C;
        }
        .money-cell .amount {
            font-weight: bold;
            color: #A0522D;
            font-size: 1.1rem;
        }
        .td-money {
            padding: 0; 
        }
        .checkbox-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .checkbox-label input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-image">
        <img src="https://raw.githubusercontent.com/OrangeSmall/ORG_site/main/secret.png" alt="秘密任務活動主視覺">
    </div>

    <h2>秘密任務動態結算系統</h2>

    <div class="instruction">
        <strong>【步驟一：設定組別與矩陣】</strong> 可在上方修改組別名稱（自動連動表格）。猜對選 <strong>Ｏ</strong>，猜錯選 <strong>Ｘ</strong>，沒猜維持 <strong>－</strong>。
    </div>
    
    <table>
        <thead>
            <tr>
                <th width="20%">猜測方 ↓ \ 被猜測目標 →</th>
                <th width="16%"><input type="text" class="group-input" id="name_1" value="A組" onkeyup="syncNames()"></th>
                <th width="16%"><input type="text" class="group-input" id="name_2" value="B組" onkeyup="syncNames()"></th>
                <th width="16%"><input type="text" class="group-input" id="name_3" value="C組" onkeyup="syncNames()"></th>
                <th width="16%"><input type="text" class="group-input" id="name_4" value="D組" onkeyup="syncNames()"></th>
                <th width="16%"><input type="text" class="group-input" id="name_5" value="E組" onkeyup="syncNames()"></th>
            </tr>
        </thead>
        <tbody id="matrix_body">
            </tbody>
    </table>

    <div class="instruction">
        <strong>【步驟二：勾選任務狀態】</strong> 勾選「完成任務」或「完美通關」，系統將自動結算最終獎金。
    </div>

    <table>
        <thead>
            <tr>
                <th width="10%">組別</th>
                <th width="15%">🟢 基礎任務</th>
                <th width="20%">⚔️ 主動攻擊<br><span style="font-size: 0.8em; font-weight: normal;">(+500 / -500)</span></th>
                <th width="20%">🛡️ 被動防守<br><span style="font-size: 0.8em; font-weight: normal;">(-500 / +500)</span></th>
                <th width="15%">👑 完美通關</th>
                <th width="20%">💰 最終獎金池</th>
            </tr>
        </thead>
        <tbody id="result_body">
            </tbody>
    </table>
</div>

<script>
    function initTables() {
        const matrixBody = document.getElementById('matrix_body');
        const resultBody = document.getElementById('result_body');
        let matrixHTML = '';
        let resultHTML = '';

        for (let i = 1; i <= 5; i++) {
            matrixHTML += `<tr><td class="row-header" id="row_label_${i}">組別 ${i}</td>`;
            for (let j = 1; j <= 5; j++) {
                if (i === j) {
                    matrixHTML += `<td class="self-cell"></td>`;
                } else {
                    matrixHTML += `
                        <td>
                            <select id="m_${i}_${j}" class="matrix-select" onchange="calculate()">
                                <option value="-">-</option>
                                <option value="O">Ｏ</option>
                                <option value="X">Ｘ</option>
                            </select>
                        </td>`;
                }
            }
            matrixHTML += `</tr>`;

            resultHTML += `
                <tr>
                    <td class="row-header" id="res_label_${i}">組別 ${i}</td>
                    <td>
                        <label class="checkbox-label">
                            <input type="checkbox" id="base_${i}" onchange="calculate()"> 完成
                        </label>
                    </td>
                    <td class="calc-output">
                        Ｏ：<span id="att_O_${i}">0</span>個<br>
                        Ｘ：<span id="att_X_${i}">0</span>個
                    </td>
                    <td class="calc-output">
                        Ｏ：<span id="def_O_${i}">0</span>個<br>
                        Ｘ：<span id="def_X_${i}">0</span>個
                    </td>
                    <td>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perf_${i}" onchange="calculate()"> 加碼
                        </label>
                    </td>
                    <td class="td-money">
                        <div class="money-cell">
                            <span class="symbol">$</span>
                            <span class="amount" id="total_${i}">0</span>
                        </div>
                    </td>
                </tr>`;
        }
        matrixBody.innerHTML = matrixHTML;
        resultBody.innerHTML = resultHTML;
        syncNames(); 
        calculate(); 
    }

    function syncNames() {
        for (let i = 1; i <= 5; i++) {
            const name = document.getElementById(`name_${i}`).value || `組別 ${i}`;
            document.getElementById(`row_label_${i}`).innerText = name;
            document.getElementById(`res_label_${i}`).innerText = name;
        }
    }

    function calculate() {
        for (let i = 1; i <= 5; i++) {
            let attackO = 0, attackX = 0;
            let defenseO = 0, defenseX = 0;

            for (let j = 1; j <= 5; j++) {
                if (i === j) continue;
                
                const attackVal = document.getElementById(`m_${i}_${j}`).value;
                if (attackVal === 'O') attackO++;
                if (attackVal === 'X') attackX++;

                const defenseVal = document.getElementById(`m_${j}_${i}`).value;
                if (defenseVal === 'O') defenseO++;
                if (defenseVal === 'X') defenseX++;
            }

            document.getElementById(`att_O_${i}`).innerText = attackO;
            document.getElementById(`att_X_${i}`).innerText = attackX;
            document.getElementById(`def_O_${i}`).innerText = defenseO;
            document.getElementById(`def_X_${i}`).innerText = defenseX;

            const baseMoney = document.getElementById(`base_${i}`).checked ? 5000 : 0;
            const perfMoney = document.getElementById(`perf_${i}`).checked ? 1000 : 0;
            
            const totalMoney = baseMoney 
                             + (attackO * 500) - (attackX * 500) 
                             - (defenseO * 500) + (defenseX * 500) 
                             + perfMoney;

            document.getElementById(`total_${i}`).innerText = totalMoney.toLocaleString();
        }
    }

    window.onload = initTables;
</script>

</body>
</html>
