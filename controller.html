<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>猜歌計分｜控分台</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --muted:#9fb0ff; --text:#eef2ff; --line:rgba(255,255,255,.12); }
    body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif; background:linear-gradient(180deg,#070a14,#0b1020); color:var(--text); }
    header{ position:sticky; top:0; background:rgba(11,16,32,.92); backdrop-filter: blur(8px); border-bottom:1px solid var(--line); padding:12px 14px; z-index:5;}
    .row{ display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .pill{ background:rgba(255,255,255,.08); border:1px solid var(--line); padding:6px 10px; border-radius:999px; font-size:13px; color:var(--muted); }
    .btn{ border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); padding:10px 12px; border-radius:12px; font-weight:700; cursor:pointer; }
    .btn:active{ transform:scale(.99); }
    .btn.primary{ background:rgba(90,120,255,.22); border-color:rgba(90,120,255,.5); }
    .btn.danger{ background:rgba(255,80,110,.18); border-color:rgba(255,80,110,.5); }
    main{ padding:14px; display:grid; gap:12px; }
    .totals{ display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
    .tile{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; }
    .tile .name{ font-size:13px; color:var(--muted); }
    .tile .score{ font-size:28px; font-weight:900; margin-top:2px; }
    .table{ background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
    .thead,.tr{ display:grid; grid-template-columns: 54px repeat(4, 1fr); }
    .thead{ background:rgba(255,255,255,.06); border-bottom:1px solid var(--line); }
    .th,.td{ padding:10px 8px; font-size:13px; }
    .th{ color:var(--muted); font-weight:800; }
    .tr{ border-bottom:1px solid var(--line); }
    .tr:last-child{ border-bottom:none; }
    .q{ font-weight:900; text-align:center; }
    .cell{ display:flex; gap:6px; justify-content:center; align-items:center; }
    .chip{ min-width:44px; text-align:center; padding:8px 0; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.05); font-weight:900; cursor:pointer; }
    .chip.on{ background:rgba(90,120,255,.25); border-color:rgba(90,120,255,.65); }
    .small{ font-size:12px; color:rgba(238,242,255,.75); }
    .footer{ padding:0 14px 18px; color:rgba(238,242,255,.65); font-size:12px; }
  </style>
</head>
<body>
<header>
  <div class="row">
    <div class="pill" id="status">尚未連線</div>
    <div class="row">
      <button class="btn primary" id="refreshBtn">同步</button>
      <button class="btn danger" id="resetBtn">全部歸零</button>
    </div>
  </div>
  <div class="row" style="margin-top:8px;">
    <div class="pill">30 題｜四隊｜每題 0/1/2 分（點選切換）</div>
    <div class="pill small" id="updatedAt">—</div>
  </div>
</header>

<main>
  <section class="totals" id="totals"></section>

  <section class="table">
    <div class="thead">
      <div class="th q">題號</div>
      <div class="th" id="h0">A隊</div>
      <div class="th" id="h1">B隊</div>
      <div class="th" id="h2">C隊</div>
      <div class="th" id="h3">D隊</div>
    </div>
    <div id="tbody"></div>
  </section>
</main>

<div class="footer">
  小提醒：大家要看的「觀看頁」可以用同一個後端資料源做另一頁（Viewer），之後我再幫你補上。
</div>

<script>
  // ✅ 1) 把這裡換成你的 Apps Script Web App URL
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx7DZ_3C6oavbYsoU0IK6qBojSwKQuk2DhRpCed9OZQtEgRzRocYiebWus3sHx3diU/exec";

  // （可選）簡單 PIN 防呆：網址加 ?pin=4091 才能操作
  const REQUIRED_PIN = ""; // 例如 "4091"；不需要就留空

  const state = {
    teams: ["TeamA","TeamB","TeamC","TeamD"],
    scores: Array.from({length:30}, () => [0,0,0,0]),
  };

  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const updatedAtEl = $("updatedAt");

  function pinOk(){
    if(!REQUIRED_PIN) return true;
    const url = new URL(location.href);
    return url.searchParams.get("pin") === REQUIRED_PIN;
  }

  function setStatus(ok, msg){
    statusEl.textContent = msg;
    statusEl.style.background = ok ? "rgba(60,220,140,.12)" : "rgba(255,80,110,.14)";
    statusEl.style.borderColor = ok ? "rgba(60,220,140,.45)" : "rgba(255,80,110,.45)";
  }

  function calcTotals(){
    const totals = [0,0,0,0];
    for (let q=0;q<30;q++){
      for (let t=0;t<4;t++) totals[t] += Number(state.scores[q][t]||0);
    }
    return totals;
  }

  function renderTotals(){
    const totals = calcTotals();
    const el = $("totals");
    el.innerHTML = "";
    for(let t=0;t<4;t++){
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.innerHTML = `
        <div class="name">${state.teams[t] || ["A隊","B隊","C隊","D隊"][t]}</div>
        <div class="score">${totals[t]}</div>
      `;
      el.appendChild(tile);
    }
  }

  function renderTable(){
    $("h0").textContent = state.teams[0] || "A隊";
    $("h1").textContent = state.teams[1] || "B隊";
    $("h2").textContent = state.teams[2] || "C隊";
    $("h3").textContent = state.teams[3] || "D隊";

    const tb = $("tbody");
    tb.innerHTML = "";
    for(let q=0;q<30;q++){
      const tr = document.createElement("div");
      tr.className = "tr";
      const cells = [];
      cells.push(`<div class="td q">${q+1}</div>`);

      for(let t=0;t<4;t++){
        const v = Number(state.scores[q][t]||0);
        // 點一次：0→1→2→0
        cells.push(`
          <div class="td">
            <div class="cell">
              <div class="chip ${v===0?'on':''}" data-q="${q}" data-t="${t}" data-v="0">0</div>
              <div class="chip ${v===1?'on':''}" data-q="${q}" data-t="${t}" data-v="1">1</div>
              <div class="chip ${v===2?'on':''}" data-q="${q}" data-t="${t}" data-v="2">2</div>
            </div>
          </div>
        `);
      }
      tr.innerHTML = cells.join("");
      tb.appendChild(tr);
    }

    tb.querySelectorAll(".chip").forEach(chip=>{
      chip.addEventListener("click", async ()=>{
        if(!pinOk()){
          alert("此頁需要 PIN 才能操作。");
          return;
        }
        const q = Number(chip.dataset.q) + 1;
        const team = Number(chip.dataset.t);
        const value = Number(chip.dataset.v);
        await setScore(q, team, value);
      });
    });
  }

  async function fetchScores(){
    const url = `${WEBAPP_URL}?action=get&t=${Date.now()}`;
    const res = await fetch(url, { method:"GET" });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "fetch failed");
    state.teams = data.teams || state.teams;
    state.scores = data.scores || state.scores;
    updatedAtEl.textContent = data.updatedAt ? `更新：${new Date(data.updatedAt).toLocaleString()}` : "—";
    renderTotals();
    renderTable();
    setStatus(true, "已同步");
  }

  async function setScore(q, team, value){
    setStatus(true, "送出中…");
    const res = await fetch(WEBAPP_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"set", q, team, value })
    });
    const data = await res.json();
    if(!data.ok) {
      setStatus(false, "更新失敗");
      alert(data.error || "更新失敗");
      return;
    }
    // 本地先更新，再拉一次確保一致
    state.scores[q-1][team] = value;
    renderTotals();
    renderTable();
    setStatus(true, "已更新");
  }

  async function resetAll(){
    if(!pinOk()){
      alert("此頁需要 PIN 才能操作。");
      return;
    }
    if(!confirm("確定要把 30 題四隊全部歸零嗎？")) return;
    setStatus(true, "歸零中…");
    const res = await fetch(WEBAPP_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"reset" })
    });
    const data = await res.json();
    if(!data.ok){
      setStatus(false, "歸零失敗");
      alert(data.error || "歸零失敗");
      return;
    }
    await fetchScores();
  }

  $("refreshBtn").addEventListener("click", ()=>fetchScores().catch(err=>{ setStatus(false, "連線失敗"); alert(err.message); }));
  $("resetBtn").addEventListener("click", ()=>resetAll().catch(err=>{ setStatus(false, "連線失敗"); alert(err.message); }));

  // 初始載入
  (async ()=>{
    try{
      renderTotals();
      renderTable();
      await fetchScores();
    }catch(err){
      setStatus(false, "尚未連線");
      console.error(err);
    }
  })();
</script>
</body>
</html>
